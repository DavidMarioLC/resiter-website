<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/gh/cferdinandi/tabby@12.0.0/dist/css/tabby-ui.min.css"
    />
  </head>
  <body>
    <section class="page-banner">
      <div class="page-banner__circle">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <ol class="breadcrumb__list">
            <li class="breadcrumb__item">
              <a href="/" class="breadcrumb__link">&lt; Home</a>
            </li>
            <li class="breadcrumb__item">
              <a href="/countries" class="breadcrumb__link">Countries</a>
            </li>
            <li class="breadcrumb__item breadcrumb__item--active">
              <span class="breadcrumb__link" aria-current="page">Chile</span>
            </li>
          </ol>
        </nav>
        <h1 class="page-banner__title">CONTACTO</h1>
      </div>
      <span class="page-banner__overlay"></span>
      <img
        src="https://picsum.photos/800/600"
        width="800"
        height="600"
        alt="A beautiful banner"
        class="page-banner__image"
      />
    </section>
    <section class="hero-skew hero-skew--contact">
      <img
        src="./assets/images/waves-decorate.svg"
        alt="Decorative waves"
        class="hero-skew__decoration"
      />
    </section>
    <form class="contact-form" id="form">
      <h1 class="contact-form__title">Formulario de Contacto</h1>
      <p class="contact-form__description">
        Agradecemos que complete el formulario para contactarnos con usted.
      </p>
      <div class="contact-form__container">
        <!-- Nombre (Ancho completo) -->
        <div class="contact-form__group contact-form__group--full">
          <input
            type="text"
            id="name"
            name="name"
            class="contact-form__input"
            placeholder="Nombre*"
            required
          />
        </div>

        <!-- E-mail -->
        <div class="contact-form__group">
          <input
            type="email"
            id="email"
            name="email"
            class="contact-form__input"
            placeholder="E-mail*"
            required
          />
        </div>

        <!-- Teléfono -->
        <div class="contact-form__group">
          <input
            type="tel"
            id="phone"
            name="phone"
            class="contact-form__input"
            placeholder="Teléfono"
          />
        </div>

        <!-- País -->
        <div class="contact-form__group">
          <input
            type="text"
            id="country"
            name="country"
            class="contact-form__input"
            placeholder="País*"
            required
          />
        </div>

        <!-- Ciudad -->
        <div class="contact-form__group">
          <input
            type="text"
            id="city"
            name="city"
            class="contact-form__input"
            placeholder="Ciudad*"
            required
          />
        </div>

        <!-- Mensaje (Ancho completo) -->
        <div class="contact-form__group contact-form__group--full">
          <textarea
            id="message"
            name="message"
            class="contact-form__textarea"
            placeholder="Mensaje*"
            required
          ></textarea>
        </div>
      </div>

      <button type="submit" class="contact-form__button">Enviar</button>
    </form>
    <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
    <script src="./assets/js/scripts.js"></script>
  </body>
</html>
